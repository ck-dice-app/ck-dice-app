<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CK骰子群-财务中心</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.prod.js"></script>
    <style>
        :root { --bg: #0d0d15; --card: #1a1a2e; --purple: #bb86fc; --blue: #03dac6; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); border: 2px solid var(--purple); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
        .amount { color: var(--blue); font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .btn-recharge { background: #2980b9; }
        .btn-withdraw { background: #8e44ad; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card); width: 90%; max-height: 80%; overflow-y: auto; padding: 20px; border-radius: 15px; text-align: center; }
        .qr-img { width: 100%; max-width: 250px; border-radius: 10px; margin: 15px 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <h2>CK钱包</h2>
            <div class="stat-row"><span>💰 当前余额</span><span class="amount">RM {{ balance }}</span></div>
            <div class="stat-row"><span>📩 总充值</span><span>RM {{ totalIn }}</span></div>
            <div class="stat-row"><span>📤 总提现</span><span>RM {{ totalOut }}</span></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-recharge" @click="showRecharge = true">💰 充值</button>
            <button class="btn btn-withdraw" @click="showWithdraw = true">💸 提现</button>
        </div>

        <div v-if="showRecharge" class="modal" @click.self="showRecharge = false">
            <div class="modal-content">
                <h3>TNG 扫码充值</h3>
                <p>收款人: ALVIN GAN JUN BIN</p>
                <img src="IMG_8893.jpeg" class="qr-img"> 
                <p>转账后请截图发给客服并申请加钱</p>
            </div>
        </div>

        <div v-if="showWithdraw" class="modal" @click.self="showWithdraw = false">
            <div class="modal-content">
                <h3>申请提现</h3>
                <input type="text" placeholder="玩家账号 (Username)" v-model="wForm.user">
                <input type="text" placeholder="银行名称 (如: Maybank)" v-model="wForm.bank">
                <input type="text" placeholder="银行账号 (Account Number)" v-model="wForm.accNum">
                <input type="text" placeholder="收款人姓名" v-model="wForm.accName">
                <input type="number" placeholder="提现金额" v-model="wForm.amount">
                <button class="btn btn-withdraw" @click="submitWithdraw">提交申请</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    balance: '0.00', totalIn: '0.00', totalOut: '0.00',
                    showRecharge: false, showWithdraw: false,
                    wForm: { user: '', bank: '', accNum: '', accName: '', amount: null }
                }
            },
            methods: {
                submitWithdraw() {
                    alert('提交成功！请等待客服核对。');
                    this.showWithdraw = false;
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
